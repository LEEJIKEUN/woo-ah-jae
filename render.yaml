services:
  - type: web
    name: woo-ah-jae
    runtime: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /login
    disk:
      name: woo-ah-jae-disk
      mountPath: /var/data
      sizeGB: 5
    envVars:
      - key: NODE_ENV
        value: production
      - key: STORAGE_BACKEND
        value: local
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_UNPOOLED
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_PUBLIC
        sync: false
      - key: R2_BUCKET_PRIVATE
        sync: false
      - key: R2_PUBLIC_BASE_URL
        sync: false
      - key: PRIVATE_UPLOAD_DIR
        value: /var/data/private_uploads
      - key: APP_URL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SUPER_ADMIN_EMAIL
        value: admin@wooahjae.local
      - key: ALLOW_DESTRUCTIVE_ADMIN_SCRIPT
        value: "false"
      - key: ALLOW_MEMBER_WITHDRAW_IN_PROD
        value: "false"
      - key: ALLOW_DEMO_SEED_IN_PROD
        value: "false"
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: SEED_ADMIN_EMAIL
        sync: false
      - key: SEED_ADMIN_PASSWORD
        sync: false
      - key: SEED_STUDENT_OWNER_EMAIL
        sync: false
      - key: SEED_STUDENT_OWNER_PASSWORD
        sync: false
      - key: SEED_STUDENT_APPLICANT_EMAIL
        sync: false
      - key: SEED_STUDENT_APPLICANT_PASSWORD
        sync: false
      - key: SEED_DEMO_USERS
        value: "false"
