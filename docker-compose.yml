services:
  postgres:
    image: postgres:16-alpine
    container_name: wooahjae-postgres
    environment:
      POSTGRES_USER: wooahjae
      POSTGRES_PASSWORD: wooahjae
      POSTGRES_DB: wooahjae
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wooahjae -d wooahjae"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
